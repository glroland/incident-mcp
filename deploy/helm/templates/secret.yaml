{{- if not .Values.servicenow.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "incident-mcp.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "incident-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  INCIDENT_MCP_API_URL: {{ .Values.servicenow.apiUrl | quote }}
  INCIDENT_MCP_API_USERNAME: {{ .Values.servicenow.apiUsername | quote }}
  INCIDENT_MCP_API_PASSWORD: {{ .Values.servicenow.apiPassword | quote }}
{{- end }}
